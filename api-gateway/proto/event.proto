syntax = "proto3";

package event;

import "google/protobuf/timestamp.proto";

service EventService {
  rpc CreateEvent (CreateEventRequest) returns (EventResponse);
  rpc GetEvent (GetEventRequest) returns (EventResponse);
  rpc ListEventsByGroup (ListEventsByGroupRequest) returns (ListEventsResponse);
  rpc ListEventsByUser (ListEventsByUserRequest) returns (ListEventsResponse);
  rpc UpdateEvent (UpdateEventRequest) returns (EventResponse);
  rpc DeleteEvent (DeleteEventRequest) returns (DeleteEventResponse);
  rpc JoinEvent (JoinEventRequest) returns (JoinEventResponse);
  rpc GetParticipants (GetParticipantsRequest) returns (GetParticipantsResponse);
  rpc CompleteWorkoutSession (CompleteWorkoutSessionRequest) returns (WorkoutSessionResponse);
  rpc ListUserWorkoutSessions (ListUserWorkoutSessionsRequest) returns (ListUserWorkoutSessionsResponse);
}

message CreateEventRequest {
  string title = 1;
  string description = 2;
  google.protobuf.Timestamp date = 3;
  string groupId = 4;
}

message GetEventRequest {
  string id = 1;
}

message ListEventsByGroupRequest {
  string groupId = 1;
}

message ListEventsByUserRequest {
  string userId = 1;
}

message UpdateEventRequest {
  string id = 1;
  string title = 2;
  string description = 3;
  google.protobuf.Timestamp date = 4;
  string userId = 5;
}

message DeleteEventRequest {
  string id = 1;
  string userId = 2;
}

message JoinEventRequest {
  string eventId = 1;
  string userId = 2;
}

message GetParticipantsRequest {
  string eventId = 1;
}

message EventResponse {
  string id = 1;
  string title = 2;
  string description = 3;
  google.protobuf.Timestamp date = 4;
  string groupId = 5;
  google.protobuf.Timestamp createdAt = 6;
}

message ListEventsResponse {
  repeated EventResponse events = 1;
}

message DeleteEventResponse {
  bool success = 1;
}

message JoinEventResponse {
  string participationId = 1;
  google.protobuf.Timestamp joinedAt = 2;
}

message ParticipantResponse {
  string userId = 1;
  google.protobuf.Timestamp joinedAt = 2;
}

message GetParticipantsResponse {
  repeated ParticipantResponse participants = 1;
}

message CompleteWorkoutSessionRequest {
  string workoutSessionId = 1;
  string userId = 2;
  string completedAt = 3;
  int32 durationMinutes = 4;
  int32 caloriesBurned = 5;
  string eventId = 6;
  string groupId = 7;
}

message WorkoutSessionResponse {
  string workoutSessionId = 1;
  string userId = 2;
  string completedAt = 3;
  int32 durationMinutes = 4;
  int32 caloriesBurned = 5;
  string eventId = 6;
  string groupId = 7;
}

message ListUserWorkoutSessionsRequest {
  string userId = 1;
  int32 limit = 2;
}

message ListUserWorkoutSessionsResponse {
  repeated WorkoutSessionResponse sessions = 1;
}
