syntax = "proto3";

package ranking;

service RankingService {
  rpc GetLeaderboard (GetLeaderboardRequest) returns (GetLeaderboardResponse);
  rpc GetUserRanking (GetUserRankingRequest) returns (RankingResponse);
  rpc UpdateScore (UpdateScoreRequest) returns (RankingResponse);
  rpc GetChallenges (GetChallengesRequest) returns (GetChallengesResponse);
  rpc GetChallengeParticipants (GetChallengeParticipantsRequest) returns (GetChallengeParticipantsResponse);
}

message GetLeaderboardRequest {
  int32 limit = 1;
}

message GetUserRankingRequest {
  string userId = 1;
}

message UpdateScoreRequest {
  string userId = 1;
  int32 points = 2;
}

message RankingResponse {
  string userId = 1;
  int32 score = 2;
  int32 rank = 3;
}

message GetLeaderboardResponse {
  repeated RankingResponse rankings = 1;
}

message GetChallengesRequest {}

message ChallengeResponse {
  string id = 1;
  string eventId = 2;
  string groupId = 3;
  string title = 4;
  string createdAt = 5;
  int32 pointsReward = 6;
}

message GetChallengesResponse {
  repeated ChallengeResponse challenges = 1;
}

message GetChallengeParticipantsRequest {
  string challengeId = 1;
}

message ChallengeParticipantResponse {
  string id = 1;
  string challengeId = 2;
  string userId = 3;
  string joinedAt = 4;
  bool completed = 5;
  string completedAt = 6;
}

message GetChallengeParticipantsResponse {
  repeated ChallengeParticipantResponse participants = 1;
}
